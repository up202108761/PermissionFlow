{% extends "base.html" %}

{% block content %}

<h1>Owner Dashboard</h1>

<table class="table table-bordered">

<thead>

<tr>

<th>Employee</th>

<th>Application</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for request in requests %}

<tr>

<td>{{ request.user.name }}</td>

<td>{{ request.application.name }}</td>

<td>{{ request.status }}</td>

<td>

<form action="/approve/{{ request.id }}" method="post">

<input
class="form-control mb-2"
name="comment"
placeholder="Comment">

<button class="btn btn-success btn-sm">

Approve

</button>

</form>

<br>

<form action="/reject/{{ request.id }}" method="post">

<input
class="form-control mb-2"
name="comment"
placeholder="Comment">

<button class="btn btn-danger btn-sm">

Reject

</button>

</form>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
