<!DOCTYPE html>
<html>

<head>
    <title>Owner Dashboard</title>
</head>

<body>

<h1>Owner Dashboard</h1>

{% for request in requests %}

<hr>

<h3>{{ request.application.name }}</h3>

<p><b>Employee:</b> {{ request.user.name }}</p>

<p><b>Access Profile:</b> {{ request.access_profile }}</p>

<p><b>Justification:</b><br>
{{ request.justification }}</p>

<p><b>Desired Date:</b> {{ request.desired_date }}</p>

<p><b>Status:</b> {{ request.status }}</p>

{% endfor %}

</body>

</html>
