{% extends "base.html" %}

{% block content %}

<h1>PermissionFlow</h1>

<p class="lead">
Internal Access Management System
</p>

<hr>

<h3>Available Applications</h3>

<div class="row">

{% for application in applications %}

<div class="col-md-4 mb-3">

<div class="card">

<div class="card-body">

<h5>{{ application.name }}</h5>

<p>{{ application.description }}</p>

<p>

<b>Owner:</b>

{{ application.owner.name }}

</p>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
