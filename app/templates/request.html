{% extends "base.html" %}

{% block content %}

<h1>Request Access</h1>

<form action="/request" method="post">

<div class="mb-3">

<label class="form-label">Application</label>

<select class="form-select" name="application">

{% for application in applications %}

<option value="{{ application.id }}">
{{ application.name }}
</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label class="form-label">Access Profile</label>

<select class="form-select" name="access_profile">

<option>Viewer</option>
<option>Developer</option>
<option>Administrator</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Justification</label>

<textarea class="form-control"
name="justification"></textarea>

</div>

<div class="mb-3">

<label class="form-label">Desired Date</label>

<input
class="form-control"
type="date"
name="desired_date">

</div>

<button class="btn btn-primary">

Submit Request

</button>

</form>

{% endblock %}
